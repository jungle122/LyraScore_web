spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lyrascore?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.lyrascore: debug

lyrascore:
  upload-dir: ./uploads
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-in-production-must-be-long-enough-for-hs256}
    expire-minutes: 1440
  ai:
    enabled: ${AI_ENABLED:false}
    provider: dashscope
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-turbo
